# AeroSpace config — https://nikitabobko.github.io/AeroSpace/guide
# Edits are picked up after `reload-config` (alt-shift-; then esc) or on save with auto-reload-config.

config-version = 2

# Start borders + AutoRaise alongside AeroSpace.
# `exec-and-forget` runs the command without blocking AeroSpace startup.
after-startup-command = [
    'exec-and-forget borders active_color=0xffe1e3e4 inactive_color=0xff494d64 width=0',
    'exec-and-forget /Users/jacob/.config/AutoRaise/launch.sh',
]

# Start AeroSpace at login
start-at-login = true

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# See: https://nikitabobko.github.io/AeroSpace/guide#layouts
# The 'accordion-padding' specifies the size of accordion padding
# You can set 0 to disable the padding feature
accordion-padding = 300

# Possible values: tiles|accordion
default-root-container-layout = 'tiles'

# Possible values: horizontal|vertical|auto
# 'auto' means: wide monitor (anything wider than high) gets horizontal orientation,
#               tall monitor (anything higher than wide) gets vertical orientation
default-root-container-orientation = 'auto'

# Mouse follows focus when focused monitor changes
# Drop it from your config, if you don't like this behavior
# See https://nikitabobko.github.io/AeroSpace/guide#on-focus-changed-callbacks
# See https://nikitabobko.github.io/AeroSpace/commands#move-mouse
# Fallback value (if you omit the key): on-focused-monitor-changed = []
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# You can effectively turn off macOS "Hide application" (cmd-h) feature by toggling this flag
# Useful if you don't use this macOS feature, but accidentally hit cmd-h or cmd-alt-h key
# Also see: https://nikitabobko.github.io/AeroSpace/goodness#disable-hide-app
automatically-unhide-macos-hidden-apps = false

# [[on-window-detected]]
# if.app-id = 'com.apple.systempreferences'
# if.app-name-regex-substring = 'settings'
# if.window-title-regex-substring = 'substring'
# if.workspace = 'workspace-name'
# if.during-aerospace-startup = true
# check-further-callbacks = true
# run = ['layout floating', 'move-node-to-workspace S']  # The callback itself

[[on-window-detected]]
if.app-name-regex-substring = 'finder'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'discord'
run = 'layout floating'

# Workspaces 1-4 prefer the LG ultrawide (when plugged in), fall back to the
# built-in laptop display when it's not. Workspace 5 is always pinned to the
# laptop. So: docked = ultrawide has 1-4, laptop has 5; undocked = laptop has 1-5.
[workspace-to-monitor-force-assignment]
    1 = ['lg', 'built-in']
    2 = ['lg', 'built-in']
    3 = ['lg', 'built-in']
    4 = ['lg', 'built-in']
    5 = 'built-in'

# Possible values: (qwerty|dvorak)
# See https://nikitabobko.github.io/AeroSpace/guide#key-mapping
[key-mapping]
    preset = 'qwerty'

# Nordic ISO Mac aliases. AeroSpace binds against physical US-layout positions,
# not the symbol on the cap. These aliases let bindings read naturally
# (alt-cmd-ctrl-plus) instead of having to remember that the '+' cap is
# physically the US-minus key. There is no built-in 'nordic' preset.
[key-mapping.key-notation-to-key-code]
    plus       = 'minus'              # Nordic '+' cap → US '-' physical key
    dash       = 'slash'              # Nordic '-' cap → US '/' physical key
    acute      = 'equal'              # Nordic '´' cap → US '=' physical key
    aring      = 'leftSquareBracket'  # Nordic 'å' cap → US '[' physical key
    diaeresis  = 'rightSquareBracket' # Nordic '¨' cap → US ']' physical key
    odiaeresis = 'semicolon'          # Nordic 'ö' cap → US ';' physical key
    adiaeresis = 'quote'              # Nordic 'ä' cap → US "'" physical key

# Gaps between windows (inner-*) and between monitor edges (outer-*).
# Possible values:
# - Constant:     gaps.outer.top = 8
# - Per monitor:  gaps.outer.top = [{ monitor.main = 16 }, { monitor."some-pattern" = 32 }, 24]
#                 In this example, 24 is a default value when there is no match.
#                 Monitor pattern is the same as for 'workspace-to-monitor-force-assignment'.
#                 See: https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
[gaps]
    inner.horizontal = 8
    inner.vertical =   8
    outer.left =       8
    outer.bottom =     8
    outer.top =        8
    outer.right =      8

# 'main' binding mode declaration
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# 'main' binding mode must be always presented
# Fallback value (if you omit the key): mode.main.binding = {}
[mode.main.binding]


# All possible keys:
# - Letters.        a, b, c, ..., z
# - Numbers.        0, 1, 2, ..., 9
# - Keypad numbers. keypad0, keypad1, keypad2, ..., keypad9
# - F-keys.         f1, f2, ..., f20
# - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon, backtick,
#                   leftSquareBracket, rightSquareBracket, space, enter, esc, backspace, tab
# - Keypad special. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
#                   keypadMinus, keypadMultiply, keypadPlus
# - Arrows.         left, down, up, right

# All possible modifiers: cmd, alt, ctrl, shift

# All possible commands: https://nikitabobko.github.io/AeroSpace/commands

# See: https://nikitabobko.github.io/AeroSpace/commands#exec-and-forget
# You can uncomment the following lines to open up terminal with alt + enter shortcut (like in i3)
# alt-enter = '''exec-and-forget osascript -e '
# tell application "Terminal"
#     do script
#     activate
# end tell'
# '''

# See: https://nikitabobko.github.io/AeroSpace/commands#layout
alt-cmd-ctrl-space   = 'layout tiles horizontal vertical'   # toggle split orientation (Hyprland togglesplit)
alt-cmd-ctrl-comma   = 'layout accordion horizontal vertical'
alt-cmd-ctrl-f       = 'fullscreen'                         # toggle fullscreen (Hyprland mod+f)
alt-cmd-ctrl-shift-f = 'layout floating tiling'             # toggle floating  (Hyprland mod+v)

# See: https://nikitabobko.github.io/AeroSpace/commands#focus
alt-cmd-ctrl-left  = 'focus left'
alt-cmd-ctrl-down  = 'focus down'
alt-cmd-ctrl-up    = 'focus up'
alt-cmd-ctrl-right = 'focus right'

# See: https://nikitabobko.github.io/AeroSpace/commands#move
alt-cmd-ctrl-shift-left  = 'move left'
alt-cmd-ctrl-shift-down  = 'move down'
alt-cmd-ctrl-shift-up    = 'move up'
alt-cmd-ctrl-shift-right = 'move right'

# See: https://nikitabobko.github.io/AeroSpace/commands#resize
alt-cmd-ctrl-plus = 'resize smart +50'
alt-cmd-ctrl-dash = 'resize smart -50'

# See: https://nikitabobko.github.io/AeroSpace/commands#workspace
alt-cmd-ctrl-1 = 'workspace 1'
alt-cmd-ctrl-2 = 'workspace 2'
alt-cmd-ctrl-3 = 'workspace 3'
alt-cmd-ctrl-4 = 'workspace 4'
alt-cmd-ctrl-5 = 'workspace 5'

# See: https://nikitabobko.github.io/AeroSpace/commands#move-node-to-workspace
alt-cmd-ctrl-shift-1 = 'move-node-to-workspace 1'
alt-cmd-ctrl-shift-2 = 'move-node-to-workspace 2'
alt-cmd-ctrl-shift-3 = 'move-node-to-workspace 3'
alt-cmd-ctrl-shift-4 = 'move-node-to-workspace 4'
alt-cmd-ctrl-shift-5 = 'move-node-to-workspace 5'

alt-cmd-ctrl-tab = 'workspace-back-and-forth'
alt-cmd-ctrl-shift-tab = 'move-workspace-to-monitor --wrap-around next'

alt-cmd-ctrl-shift-odiaeresis = 'mode service'  # 'ö' cap

[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main']
    f = ['layout floating tiling', 'mode main']
    backspace = ['close-all-windows-but-current', 'mode main']

    alt-cmd-ctrl-shift-left  = ['join-with left', 'mode main']
    alt-cmd-ctrl-shift-down  = ['join-with down', 'mode main']
    alt-cmd-ctrl-shift-up    = ['join-with up', 'mode main']
    alt-cmd-ctrl-shift-right = ['join-with right', 'mode main']
