# tmux.reset.conf — curated reference of default keys for common actions.
#
# This file restates tmux's built-in default key for each action that omerxx's
# version covered, so you can scan it to answer "what's the default key for X?".
# Almost every `bind` line below is a no-op restatement of an existing default;
# the file's value is documentation-in-code, not behavior change.
#
# Real overrides/additions live under CUSTOMIZATIONS at the bottom.

# --- Defaults: window management ---
bind c new-window                                          # default
bind d detach-client                                       # default
bind p previous-window                                     # default
bind n next-window                                         # default
bind , command-prompt -I "#W" { rename-window "%%" }       # default (rename-window)
bind l last-window                                         # default
bind w choose-tree -Zw                                     # default (interactive window picker)

# --- Defaults: panes ---
bind z resize-pane -Z                                      # default (toggle zoom)
bind '"' split-window                                      # default (split vertical — panes stacked)
bind % split-window -h                                     # default (split horizontal — panes side-by-side)
bind Up    select-pane -U                                  # default (arrow keys, NOT hjkl)
bind Down  select-pane -D
bind Left  select-pane -L
bind Right select-pane -R
bind -r C-Up    resize-pane -U                             # default (1-cell resize)
bind -r C-Down  resize-pane -D
bind -r C-Left  resize-pane -L
bind -r C-Right resize-pane -R
bind -r M-Up    resize-pane -U 5                           # default (5-cell resize)
bind -r M-Down  resize-pane -D 5
bind -r M-Left  resize-pane -L 5
bind -r M-Right resize-pane -R 5
bind x confirm-before -p "kill-pane #P? (y/n)" kill-pane   # default
bind '}' swap-pane -D                                      # default
bind '{' swap-pane -U                                      # default

# --- Defaults: sessions & misc ---
bind s choose-tree -Zs                                     # default (interactive session picker)
bind r refresh-client                                      # default
bind : command-prompt                                      # default
bind \[ copy-mode                                          # default (enter copy mode)
bind \] paste-buffer -p                                    # default (paste from buffer)
bind \? list-keys -N                                       # default (show all bindings)

# ============================================================================
# CUSTOMIZATIONS — actual overrides/additions
# ============================================================================
# Prefix-key setup lives in tmux.conf (not here) — see the "Prefix" block there.

# --- Reload config (no tmux default — capital R is the common convention) ---
bind R source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"
