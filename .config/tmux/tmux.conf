# tmux config. Lives at ~/.config/tmux/tmux.conf (tmux 3.1+ reads this natively;
# no -f flag, no ~/.tmux.conf needed). Reload after edits with `prefix r`.

# Source the prefix-table baseline (all default bindings + our overrides).
# See tmux.reset.conf — it's the source of truth for `prefix + X` behavior.
source-file ~/.config/tmux/tmux.reset.conf

# --- True color (24-bit) ---
# Without these, terminal colors get quantized to 256 inside tmux panes.
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*256col*:RGB,xterm-ghostty:RGB"

# --- Prefix: C-a (replaces default C-b) ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix             # double-tap prefix to send literal C-a

# --- General ---
set -g base-index 1              # start indexing windows at 1 instead of 0
set -g detach-on-destroy off     # don't exit from tmux when closing a session
set -g escape-time 0             # zero-out escape time delay
set -g history-limit 1000000     # increase history size (from 2,000)
set -g renumber-windows on       # renumber all windows when any window is closed
set -g set-clipboard on          # use system clipboard
set -g status-position top       # macOS / darwin style
set -g default-terminal "${TERM}"
setw -g mode-keys vi
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'

# ============================================================================
# Plugins (managed by tpm — tmux plugin manager)
# ============================================================================
# install.sh clones tpm and installs all plugins listed below. After editing
# this section, re-run ./install.sh — or, from inside tmux, press
# `prefix + I` (capital i) to install new plugins, `prefix + U` to update.

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.3.0'

# --- Catppuccin theme ---
set -g @catppuccin_flavor 'mocha'              # matches Starship's catppuccin_mocha
set -g @catppuccin_window_status_style 'rounded'

# Status line — catppuccin v2 requires manual composition via its modules.
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"

# Initialize tpm — must be the very last line in this file.
run '~/.config/tmux/plugins/tpm/tpm'
